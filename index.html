<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WorldCup Dashboard 2026</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- Header -->
    <header class="header">
        <div class="container">
            <h1 class="header-title">⚽ WorldCup Dashboard 2026</h1>
        </div>
    </header>

    <!-- Main Container -->
    <main class="main-content">
        <div class="container">
            <!-- Statistics Section -->
            <section class="statistics-section">
                <div class="stat-card">
                    <div class="stat-value" id="total-matches">0</div>
                    <div class="stat-label">Total Matches</div>
                </div>
                <div class="stat-card">
                    <div class="stat-value" id="watched-matches">0</div>
                    <div class="stat-label">Watched Matches</div>
                </div>
                <div class="stat-card">
                    <div class="stat-value" id="favorite-matches">0</div>
                    <div class="stat-label">Favorite Matches</div>
                </div>
            </section>

            <!-- Add Match Section -->
            <section class="add-match-section">
                <h2 class="section-title">Add New Match</h2>
                <form class="match-form" id="match-form">
                    <div class="form-group">
                        <label for="home-team">Home Team</label>
                        <input 
                            type="text" 
                            id="home-team" 
                            placeholder="Enter home team name"
                            required
                        >
                    </div>
                    <div class="form-group">
                        <label for="away-team">Away Team</label>
                        <input 
                            type="text" 
                            id="away-team" 
                            placeholder="Enter away team name"
                            required
                        >
                    </div>
                    <div class="form-group">
                        <label for="group">Group</label>
                        <input 
                            type="text" 
                            id="group" 
                            placeholder="e.g., Group A"
                            required
                        >
                    </div>
                    <div class="form-group">
                        <label for="date">Date</label>
                        <input 
                            type="datetime-local" 
                            id="date"
                            required
                        >
                    </div>
                    <div class="form-group">
                        <label for="score">Score</label>
                        <input 
                            type="text" 
                            id="score" 
                            placeholder="e.g., 2-1"
                            required
                        >
                    </div>
                    <button type="submit" class="btn-primary">Add Match</button>
                </form>
            </section>

            <!-- Search Section -->
            <section class="search-section">
                <h2 class="section-title">Search Matches</h2>
                <div class="search-container">
                    <input 
                        type="text" 
                        id="search-input" 
                        class="search-input"
                        placeholder="Search by team name or group..."
                    >
                </div>
            </section>

            <!-- Group Standings Section -->
            <section class="standings-section">
                <h2 class="section-title">Group Standings</h2>
                <div id="standings-container" class="standings-container"></div>
            </section>

            <!-- Prediction Section -->
            <section class="prediction-section">
                <h2 class="section-title">Match Predictor</h2>
                <div class="prediction-card">
                    <input id="predict-team-a" type="text" placeholder="First team e.g. Portugal">
                    <input id="predict-team-b" type="text" placeholder="Second team e.g. France">
                    <button id="predict-button" class="btn-primary">Predict Winner</button>
                    <div id="prediction-result" class="prediction-result"></div>
                </div>
            </section>

            <!-- Tournament Statistics Section -->
            <section class="tournament-stats-section">
                <h2 class="section-title">Tournament Statistics</h2>
                <div id="tournament-stats-container" class="tournament-stats-container"></div>
            </section>

            <!-- Matches Section -->
            <section class="matches-section">
                <h2 class="section-title">Matches</h2>
                <div id="matches-container" class="matches-container"></div>
            </section>
        </div>
    </main>

    <!-- Footer -->
    <footer class="footer">
        <div class="container">
            <p>&copy; 2026 WorldCup Dashboard. All rights reserved.</p>
        </div>
    </footer>

    <script src="matches.js"></script>
    <script src="storage.js"></script>
    <script src="statistics.js"></script>
    <script src="app.js"></script>
</body>
</html>
